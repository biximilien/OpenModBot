plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.3
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "redis-data/**/*"
    - "postgres-data/**/*"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/EndOfLine:
  Enabled: false

Lint/MissingSuper:
  AllowedParentClasses:
    - Classifier
    - ClassificationCacheRepository
    - ClassificationJobRepository
    - ClassificationRecordRepository
    - InteractionEventRepository
    - RelationshipEdgeRepository
    - ServerRateLimitRepository
    - Provider
    - Plugin

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/AbcSize:
  Max: 30
  Exclude:
    - "spec/support/fake_postgres_connection.rb"

Metrics/ClassLength:
  Max: 220
  Exclude:
    - "spec/support/fake_postgres_connection.rb"

Metrics/CyclomaticComplexity:
  Max: 10
  Exclude:
    - "spec/support/fake_postgres_connection.rb"

Metrics/MethodLength:
  Max: 30
  Exclude:
    - "spec/support/fake_postgres_connection.rb"

Metrics/ModuleLength:
  Max: 120

Metrics/ParameterLists:
  CountKeywordArgs: false
  Max: 8

Metrics/PerceivedComplexity:
  Exclude:
    - "spec/support/fake_postgres_connection.rb"

RSpec/DescribeClass:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/VerifiedDoubleReference:
  Enabled: false

Style/MultilineBlockChain:
  Exclude:
    - "spec/support/fake_postgres_connection.rb"
