inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.3
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "redis-data/**/*"
    - "postgres-data/**/*"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Layout/EndOfLine:
  Enabled: false

Lint/MissingSuper:
  AllowedParentClasses:
    - Classifier
    - ClassificationCacheRepository
    - ClassificationJobRepository
    - ClassificationRecordRepository
    - InteractionEventRepository
    - RelationshipEdgeRepository
    - ServerRateLimitRepository
    - Provider
    - Plugin

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 20
