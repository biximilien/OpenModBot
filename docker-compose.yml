services:
  bot:
    build:
      context: .
      args:
        BUNDLE_WITH: ${BUNDLE_WITH:-}
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      OPENAI_REWRITE_MODEL: ${OPENAI_REWRITE_MODEL:-gpt-4.1-mini}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-2.5-flash}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/openmodbot}
      HARASSMENT_CLASSIFIER_MODEL: ${HARASSMENT_CLASSIFIER_MODEL:-gpt-4o-2024-08-06}
      HARASSMENT_CLASSIFIER_CACHE_TTL_SECONDS: ${HARASSMENT_CLASSIFIER_CACHE_TTL_SECONDS:-3600}
      HARASSMENT_CLASSIFIER_RATE_LIMIT_PER_MINUTE: ${HARASSMENT_CLASSIFIER_RATE_LIMIT_PER_MINUTE:-30}
      MODERATION_SHADOW_MODE: ${MODERATION_SHADOW_MODE:-false}
      MODERATION_SHADOW_REWRITE: ${MODERATION_SHADOW_REWRITE:-true}
      MODERATION_REVIEW_STORE_CONTENT: ${MODERATION_REVIEW_STORE_CONTENT:-false}
      KARMA_AUTOMOD_THRESHOLD: ${KARMA_AUTOMOD_THRESHOLD:--5}
      KARMA_AUTOMOD_ACTION: ${KARMA_AUTOMOD_ACTION:-timeout}
      KARMA_TIMEOUT_SECONDS: ${KARMA_TIMEOUT_SECONDS:-3600}
      LOG_INVITE_URL: ${LOG_INVITE_URL:-false}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      TELEMETRY_HASH_SALT: ${TELEMETRY_HASH_SALT:-development-telemetry-salt}
      PLUGIN_REQUIRES: ${PLUGIN_REQUIRES:-}
      PLUGINS: ${PLUGINS:-}
      PERSONALITY: ${PERSONALITY:-objective}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-OpenModBot}
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis
    profiles:
      - redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    restart: always
    ports:
      - 6379:6379
    volumes:
      - ./redis-data:/data
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: openmodbot-postgres
    profiles:
      - postgres
    environment:
      POSTGRES_DB: openmodbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/harassment/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_harassment_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmodbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
