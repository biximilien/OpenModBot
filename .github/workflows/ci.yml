name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ruby:
          - "3.3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run test suite
        run: bundle exec rspec --format documentation

      - name: Check Ruby syntax
        run: ruby -e "Dir['{lib,scripts}/**/*.rb'].each { |file| system('ruby', '-c', file) || exit(1) }"

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .

      - name: Build Docker image with optional groups
        run: docker build --build-arg BUNDLE_WITH=postgres:telemetry .
